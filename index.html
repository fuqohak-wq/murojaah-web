<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional AI Brochure</title>
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        .ratio-square .instagram-slide { aspect-ratio: 1 / 1 !important; }
        .ratio-story .instagram-slide { aspect-ratio: 9 / 16 !important; }
        .ratio-a4 .instagram-slide { aspect-ratio: 1 / 1.414 !important; }

        .instagram-slide {
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            background-size: cover;
            background-position: center;
        }
        
        .font-arabic { font-family: 'Amiri', serif; line-height: 1.8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 py-10">

<div id="loading" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center text-white">
    <div class="text-center">
        <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        <p class="font-bold">Sedang Merancang Layout Profesional...</p>
    </div>
</div>

<div class="max-w-5xl mx-auto px-4">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
        <!-- Input -->
        <div class="bg-white p-6 rounded-2xl shadow-lg space-y-4">
            <h2 class="text-xl font-bold border-b pb-2">Konfigurasi Desain</h2>
            
            <div>
                <label class="block text-sm font-bold mb-1">Nama Pesantren</label>
                <input type="text" id="infoTeks" class="w-full p-3 border rounded-xl" placeholder="Miftahul Ulum...">
            </div>

            <div>
                <label class="block text-sm font-bold mb-1">Teks / Kutipan Arab & Fasilitas (Akan dibagi ke slide)</label>
                <textarea id="catatanTambahan" rows="6" class="w-full p-3 border rounded-xl text-sm font-arabic" placeholder="Masukkan teks Arab atau keterangan di sini..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold mb-1">Format</label>
                    <select id="formatBrosur" class="w-full p-3 border rounded-xl bg-white">
                        <option value="ratio-square">Instagram 1:1</option>
                        <option value="ratio-story">Story 9:16</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">Jumlah Slide</label>
                    <select id="jumlahGambar" class="w-full p-3 border rounded-xl bg-white">
                        <option value="3">3 Slide</option>
                        <option value="5" selected>5 Slide</option>
                        <option value="7">7 Slide</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold mb-1">Tema Warna</label>
                <select id="modelBrosur" class="w-full p-3 border rounded-xl bg-white">
                    <option value="Mewah (Emerald Gold)">Mewah (Emerald Gold)</option>
                    <option value="Eksklusif (Black Gold)">Eksklusif (Black Gold)</option>
                    <option value="Modern (White Blue)">Modern (White Blue)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold mb-1">Upload Foto</label>
                <input type="file" id="fotoInput" multiple accept="image/*" class="w-full text-sm">
            </div>

            <button id="btnGenerate" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl hover:bg-emerald-700 transition">
                BUAT DESAIN SEKARANG
            </button>
        </div>

        <!-- Preview -->
        <div>
            <h2 class="text-xl font-bold mb-4">Pratinjau Hasil</h2>
            <div id="canvasBrosur" class="ratio-square flex flex-col gap-6">
                <!-- Hasil Render -->
                <div class="instagram-slide bg-white p-10 text-center border-2 border-dashed text-slate-400">
                    Belum ada desain yang dibuat.
                </div>
            </div>
            <button id="btnDownload" class="hidden mt-6 w-full bg-slate-900 text-white py-4 rounded-xl font-bold">
                📥 DOWNLOAD SEMUA SLIDE
            </button>
        </div>
    </div>
</div>

<script>
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwiLTj8sh6t9Zc6Znh1sdH_Y6u9TjOvMbo20jSRuhMRFOavsyHgkMnJr92ZTE_qEgJa/exec"; // GANTI DENGAN URL WEB APP ANDA

    let listFotoBase64 = [];
    document.getElementById('fotoInput').addEventListener('change', async (e) => {
        listFotoBase64 = [];
        const files = e.target.files;
        for (let file of files) {
            const reader = new FileReader();
            reader.onload = (ev) => listFotoBase64.push(ev.target.result.split(',')[1]);
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('btnGenerate').onclick = async () => {
        const info = document.getElementById('infoTeks').value;
        if (!info || listFotoBase64.length === 0) return alert("Isi Nama & Upload Foto!");

        document.getElementById('loading').classList.remove('hidden');
        const format = document.getElementById('formatBrosur').value;
        document.getElementById('canvasBrosur').className = format + " flex flex-col gap-6";

        try {
            const params = new URLSearchParams();
            params.append('infoTeks', info);
            params.append('catatanTambahan', document.getElementById('catatanTambahan').value);
            params.append('jumlahGambar', document.getElementById('jumlahGambar').value);
            params.append('modelBrosur', document.getElementById('modelBrosur').value);
            params.append('listFotoBase64', JSON.stringify(listFotoBase64));

            const res = await fetch(BACKEND_URL, { method: 'POST', body: params });
            const data = await res.json();
            
            if (data.success) {
                document.getElementById('canvasBrosur').innerHTML = data.html;
                document.getElementById('btnDownload').classList.remove('hidden');
            }
        } catch (e) {
            alert("Koneksi gagal!");
        } finally {
            document.getElementById('loading').classList.add('hidden');
        }
    };

    document.getElementById('btnDownload').onclick = async () => {
        const slides = document.querySelectorAll('.instagram-slide');
        for (let i = 0; i < slides.length; i++) {
            const canvas = await html2canvas(slides[i], { scale: 3, useCORS: true });
            const a = document.createElement('a');
            a.download = `Slide-${i+1}.png`;
            a.href = canvas.toDataURL();
            a.click();
            await new Promise(r => setTimeout(r, 500));
        }
    };
</script>
</body>
</html>
