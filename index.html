<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium AI Pesantren Brochure</title>
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        .preview-container {
            background: #e2e8f0;
            padding: 30px;
            border-radius: 1.5rem;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #canvasBrosur {
            width: 100%;
            max-width: 450px; 
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* STRICT ASPECT RATIO CONTROL */
        .ratio-square .instagram-slide { aspect-ratio: 1 / 1 !important; width: 100%; }
        .ratio-story .instagram-slide { aspect-ratio: 9 / 16 !important; width: 100%; }
        .ratio-a4 .instagram-slide { aspect-ratio: 1 / 1.414 !important; width: 100%; }

        .instagram-slide {
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(8px);
            color: white;
        }
    </style>
</head>
<body class="py-10 px-4">

<div id="loading" class="loading-overlay hidden">
    <div class="text-center">
        <div class="animate-spin rounded-full h-20 w-20 border-t-4 border-emerald-500 border-slate-700 mx-auto mb-6"></div>
        <p class="text-xl font-bold tracking-wide">Mendesain Mahakarya Anda...</p>
        <p class="text-slate-400 mt-2">AI sedang menyusun layout mewah & infografis</p>
    </div>
</div>

<div class="max-w-6xl mx-auto">
    <div class="text-center mb-12">
        <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">AI Premium Brochure Generator</h1>
        <p class="text-slate-500 mt-2">Ubah teks mentah menjadi Carousel Instagram sekelas Agensi Desain</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
        <!-- Panel Kontrol -->
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Nama Pondok / Judul Utama</label>
                    <input type="text" id="infoTeks" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition" placeholder="Contoh: Pondok Pesantren Tahfidz Al-Karim">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Detail Fasilitas & Deskripsi (Input Mentah)</label>
                    <textarea id="catatanTambahan" rows="4" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition text-sm" placeholder="Ketik semua fasilitas di sini, AI akan merangkumnya menjadi poin-poin estetik..."></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Format Ukuran</label>
                        <select id="formatBrosur" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl appearance-none outline-none">
                            <option value="ratio-square">Instagram Post (1:1)</option>
                            <option value="ratio-story">Instagram Story (9:16)</option>
                            <option value="ratio-a4">Brosur Cetak (A4)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Target Slide</label>
                        <select id="jumlahGambar" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl appearance-none outline-none">
                            <option value="3">3 Halaman</option>
                            <option value="4">4 Halaman</option>
                            <option value="5" selected>5 Halaman</option>
                            <option value="7">7 Halaman</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Tema & Palet Warna</label>
                    <select id="modelBrosur" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl appearance-none outline-none">
                        <option value="Mewah (Deep Emerald & Gold)">Mewah (Deep Emerald & Gold)</option>
                        <option value="Modern (Royal Blue & White)">Modern (Royal Blue & White)</option>
                        <option value="Tradisional (Earth Tone & Brown)">Tradisional (Earth Tone & Brown)</option>
                        <option value="Ceria (Pastel Orange & Yellow)">Ceria (Anak-anak/Pastel)</option>
                        <option value="Eksklusif (Black & Dark Grey Gold)">Eksklusif (Black & Gold)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Galeri Foto Pondok</label>
                    <input type="file" id="fotoInput" accept="image/*" multiple class="block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
                </div>

                <button id="btnGenerate" class="w-full bg-slate-900 hover:bg-black text-white font-black py-5 rounded-2xl transition-all shadow-2xl transform hover:-translate-y-1">
                    GENERATE MASTERPIECE ✨
                </button>
            </div>
        </div>

        <!-- Preview -->
        <div class="flex flex-col gap-6">
            <div class="flex justify-between items-end">
                <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Live Preview</h2>
                <div id="statusInfo" class="text-xs font-bold text-emerald-600 bg-emerald-100 px-3 py-1 rounded-full hidden">READY TO DOWNLOAD</div>
            </div>
            
            <div class="preview-container shadow-inner">
                <div id="canvasBrosur" class="ratio-square">
                    <div class="instagram-slide p-12 text-center flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-3xl">
                        <svg class="w-16 h-16 text-slate-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <p class="text-slate-400 font-medium">Brosur premium Anda akan muncul di sini.</p>
                    </div>
                </div>
            </div>

            <button id="btnDownload" class="hidden w-full bg-emerald-600 text-white py-5 rounded-2xl font-black hover:bg-emerald-700 transition shadow-xl uppercase tracking-widest">
                📥 DOWNLOAD ALL SLIDES (HD)
            </button>
        </div>
    </div>
</div>

<script>
    // MASUKKAN URL WEB APP ANDA DI SINI
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwiLTj8sh6t9Zc6Znh1sdH_Y6u9TjOvMbo20jSRuhMRFOavsyHgkMnJr92ZTE_qEgJa/exec"; 

    let listFotoBase64 = [];

    document.getElementById('fotoInput').addEventListener('change', async function(e) {
        listFotoBase64 = [];
        const files = e.target.files;
        for (let file of files) {
            const reader = new FileReader();
            reader.onload = (event) => {
                listFotoBase64.push(event.target.result.split(',')[1]);
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('btnGenerate').addEventListener('click', async () => {
        const info = document.getElementById('infoTeks').value;
        if (!info || listFotoBase64.length === 0) {
            alert("Mohon masukkan nama pesantren dan minimal 1 foto!");
            return;
        }

        const formatClass = document.getElementById('formatBrosur').value;
        document.getElementById('canvasBrosur').className = formatClass;
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('btnDownload').classList.add('hidden');

        try {
            const params = new URLSearchParams();
            params.append('infoTeks', info);
            params.append('catatanTambahan', document.getElementById('catatanTambahan').value);
            params.append('formatBrosur', formatClass);
            params.append('jumlahGambar', document.getElementById('jumlahGambar').value);
            params.append('modelBrosur', document.getElementById('modelBrosur').value);
            params.append('listFotoBase64', JSON.stringify(listFotoBase64));

            const response = await fetch(BACKEND_URL, { method: 'POST', body: params });
            const data = await response.json();

            if (data.success) {
                document.getElementById('canvasBrosur').innerHTML = data.html;
                document.getElementById('btnDownload').classList.remove('hidden');
                document.getElementById('statusInfo').classList.remove('hidden');
            } else {
                alert("Error AI: " + data.error);
            }
        } catch (err) {
            alert("Gagal terhubung ke backend. Pastikan URL Web App benar!");
        } finally {
            document.getElementById('loading').classList.add('hidden');
        }
    });

    document.getElementById('btnDownload').onclick = async () => {
        const slides = document.querySelectorAll('.instagram-slide');
        for (let i = 0; i < slides.length; i++) {
            const canvas = await html2canvas(slides[i], { scale: 3, useCORS: true, logging: false });
            const link = document.createElement('a');
            link.download = `Slide-${i+1}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            await new Promise(r => setTimeout(r, 600));
        }
    };
</script>
</body>
</html>
