<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Instagram Content Generator</title>
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .preview-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
        }
        .canvas-item {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            background: #ffffff;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-radius: 0.75rem;
            overflow: hidden;
            aspect-ratio: 1 / 1; /* Default */
        }
        .ratio-1-1 { aspect-ratio: 1 / 1 !important; }
        .ratio-9-16 { aspect-ratio: 9 / 16 !important; }
        .ratio-a4 { aspect-ratio: 1 / 1.414 !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto px-4 py-10">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-emerald-700 mb-2">InstaPost AI Generator</h1>
            <p class="text-gray-600">Ubah catatan berantakan menjadi konten mikroblog profesional</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
            <!-- Form Input -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Konfigurasi Konten</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Catatan / Materi (Akan diringkas AI):</label>
                        <textarea id="infoTeks" rows="6" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Tempel catatan mentah Anda di sini..."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Jumlah Gambar/Slide</label>
                            <select id="jumlahGambar" class="w-full p-3 border border-gray-300 rounded-lg bg-white">
                                <option value="1">1 Gambar</option>
                                <option value="2">2 Gambar (Carousel)</option>
                                <option value="3">3 Gambar (Carousel)</option>
                                <option value="4">4 Gambar (Carousel)</option>
                                <option value="5">5 Gambar (Carousel)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Format/Rasio</label>
                            <select id="formatBrosur" class="w-full p-3 border border-gray-300 rounded-lg bg-white">
                                <option value="1:1">Square (1:1)</option>
                                <option value="9:16">Story (9:16)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Tema Visual</label>
                        <select id="modelBrosur" class="w-full p-3 border border-gray-300 rounded-lg bg-white">
                            <option value="Modern & Minimalis">Modern & Minimalis</option>
                            <option value="Luxury Gold & Dark">Luxury Gold & Dark</option>
                            <option value="Clean Medical/Corporate">Clean Corporate</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Upload Foto Pendukung</label>
                        <input type="file" id="fotoInput" accept="image/*" multiple class="w-full p-2 border border-gray-300 rounded-lg bg-white">
                    </div>

                    <button id="btnGenerate" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-lg transition shadow-md cursor-pointer">
                        Proses AI & Buat Gambar ✨
                    </button>
                </div>
            </div>

            <!-- Preview Area -->
            <div class="space-y-4 w-full">
                <div id="loading" class="hidden text-center p-6 bg-white rounded-xl shadow-md">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-600 mx-auto mb-2"></div>
                    <p class="text-sm font-medium">AI sedang meringkas materi & mendesain...</p>
                </div>
                
                <div id="containerHasil" class="preview-wrapper">
                    <!-- Hasil slide akan muncul di sini secara dinamis -->
                </div>

                <div id="downloadArea" class="hidden">
                    <button onclick="downloadSemua()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg transition-all">
                        📥 Download Semua Gambar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "URL_WEB_APP_ANDA_DISINI"; 
        let listFotoBase64 = []; 

        document.getElementById('fotoInput').addEventListener('change', async function(e) {
            listFotoBase64 = [];
            const files = e.target.files;
            const readFileAsBase64 = (file) => new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.replace(/^data:image\/(png|jpg|jpeg);base64,/, ""));
                reader.readAsDataURL(file);
            });
            for (let file of files) {
                listFotoBase64.push(await readFileAsBase64(file));
            }
        });

        document.getElementById('btnGenerate').addEventListener('click', async () => {
            const infoTeks = document.getElementById('infoTeks').value;
            const jumlah = document.getElementById('jumlahGambar').value;
            const format = document.getElementById('formatBrosur').value;
            const model = document.getElementById('modelBrosur').value;

            if (!infoTeks) return alert("Isi catatan/materi dulu!");

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('containerHasil').innerHTML = "";
            document.getElementById('downloadArea').classList.add('hidden');

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    body: JSON.stringify({ infoTeks, jumlah, format, model, listFotoBase64 })
                });
                const data = await response.json();

                if (data.success) {
                    // AI mengembalikan slide yang dipisahkan oleh delimiter
                    const slides = data.html.split('<!-- SLIDE_BREAK -->');
                    slides.forEach((htmlContent, index) => {
                        if(htmlContent.trim().length < 10) return;
                        const div = document.createElement('div');
                        div.id = `slide-${index}`;
                        div.className = `canvas-item ratio-${format.replace(':','-')}`;
                        div.innerHTML = htmlContent;
                        document.getElementById('containerHasil').appendChild(div);
                    });
                    document.getElementById('downloadArea').classList.remove('hidden');
                }
            } catch (error) {
                alert("Error: " + error);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        });

        async function downloadSemua() {
            const slides = document.querySelectorAll('.canvas-item');
            for (let i = 0; i < slides.length; i++) {
                const canvas = await html2canvas(slides[i], { scale: 2 });
                const link = document.createElement('a');
                link.download = `post-ai-${i+1}.png`;
                link.href = canvas.toDataURL();
                link.click();
                await new Promise(r => setTimeout(r, 500)); // Jeda antar download
            }
        }
    </script>
</body>
</html>
