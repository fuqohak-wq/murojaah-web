<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Professional Carousel</title>
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        
        /* KUNCI ASPEK RASIO KETAT */
        .ratio-square .instagram-slide { 
            width: 450px !important; 
            height: 450px !important; 
            flex-shrink: 0;
        }
        .ratio-story .instagram-slide { 
            width: 360px !important; 
            height: 640px !important; 
            flex-shrink: 0;
        }

        #canvasBrosur {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
        }

        .instagram-slide {
            background: white;
            position: relative;
            box-sizing: border-box;
        }

        .font-arabic { font-family: 'Amiri', serif; }
    </style>
</head>
<body class="p-4 md:p-10">

<div id="loading" class="hidden fixed inset-0 bg-slate-900/95 z-50 flex flex-col items-center justify-center text-white">
    <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="font-bold tracking-widest uppercase text-xs">AI IS CURATING YOUR CONTENT...</p>
</div>

<div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
    <!-- Panel Kontrol -->
    <div class="bg-white p-8 rounded-3xl shadow-xl space-y-5 border border-slate-100">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white font-bold">AI</div>
            <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">Premium Carousel Maker</h1>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-black uppercase text-slate-500 mb-1">Nama Pesantren</label>
                <input type="text" id="infoTeks" class="w-full p-4 bg-slate-50 border rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Contoh: Al-Mashuriyah International">
            </div>

            <div>
                <label class="block text-xs font-black uppercase text-slate-500 mb-1">Materi / Teks Arab (Input Sebanyak Mungkin)</label>
                <textarea id="catatanTambahan" rows="6" class="w-full p-4 bg-slate-50 border rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-arabic" placeholder="Tempel materi panjang di sini, AI akan merangkumnya otomatis..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-black uppercase text-slate-500 mb-1">Format</label>
                    <select id="formatBrosur" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                        <option value="ratio-square">Persegi 1:1 (Post)</option>
                        <option value="ratio-story">Portrait 9:16 (Story)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-black uppercase text-slate-500 mb-1">Slide</label>
                    <select id="jumlahGambar" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                        <option value="4">4 Halaman</option>
                        <option value="6" selected>6 Halaman</option>
                        <option value="8">8 Halaman</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-black uppercase text-slate-500 mb-1">Model Warna</label>
                <select id="modelBrosur" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                    <option value="Mewah (Deep Emerald Green & Gold)">Emerald Gold Luxury</option>
                    <option value="Modern (Deep Blue & White)">Corporate Modern Blue</option>
                    <option value="Eksklusif (Black & Gold Premium)">Black & Gold Premium</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-black uppercase text-slate-500 mb-1">Foto Galeri</label>
                <input type="file" id="fotoInput" multiple accept="image/*" class="w-full text-xs">
            </div>

            <button id="btnGenerate" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl hover:bg-black transition shadow-2xl transform active:scale-95">
                GENERATE PREMIUM SLIDES ✨
            </button>
        </div>
    </div>

    <!-- Preview -->
    <div class="flex flex-col items-center">
        <div class="flex justify-between w-full max-w-[450px] mb-4 items-end">
            <h2 class="text-xl font-bold text-slate-800">Preview Design</h2>
            <span class="text-[10px] bg-slate-200 px-2 py-1 rounded font-bold">HI-RES OUTPUT</span>
        </div>
        
        <div id="canvasBrosur" class="ratio-square">
            <div class="instagram-slide flex items-center justify-center border-4 border-dashed border-slate-200 rounded-3xl text-slate-300 font-bold uppercase text-xs tracking-widest bg-white">
                No Design Generated
            </div>
        </div>

        <button id="btnDownload" class="hidden mt-8 w-full max-w-[450px] bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-emerald-700 transition">
            📥 DOWNLOAD ALL SLIDES
        </button>
    </div>
</div>

<script>
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwiLTj8sh6t9Zc6Znh1sdH_Y6u9TjOvMbo20jSRuhMRFOavsyHgkMnJr92ZTE_qEgJa/exec"; 
    let listFotoBase64 = [];

    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 900;
                    const scale = MAX / Math.max(img.width, img.height);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                };
            };
        });
    }

    document.getElementById('fotoInput').onchange = async (e) => {
        listFotoBase64 = [];
        for (let file of e.target.files) {
            listFotoBase64.push(await compressImage(file));
        }
    };

    document.getElementById('btnGenerate').onclick = async () => {
        const info = document.getElementById('infoTeks').value;
        if (!info || listFotoBase64.length === 0) return alert("Lengkapi Nama & Foto!");

        document.getElementById('loading').classList.remove('hidden');
        const format = document.getElementById('formatBrosur').value;
        document.getElementById('canvasBrosur').className = format;

        try {
            const res = await fetch(BACKEND_URL, {
                method: 'POST',
                body: JSON.stringify({
                    infoTeks: info,
                    catatanTambahan: document.getElementById('catatanTambahan').value,
                    formatBrosur: format,
                    jumlahGambar: document.getElementById('jumlahGambar').value,
                    modelBrosur: document.getElementById('modelBrosur').value,
                    listFotoBase64: listFotoBase64
                })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('canvasBrosur').innerHTML = data.html;
                document.getElementById('btnDownload').classList.remove('hidden');
            }
        } catch (e) {
            alert("Error Koneksi!");
        } finally {
            document.getElementById('loading').classList.add('hidden');
        }
    };

    document.getElementById('btnDownload').onclick = async () => {
        const slides = document.querySelectorAll('.instagram-slide');
        for (let i = 0; i < slides.length; i++) {
            const canvas = await html2canvas(slides[i], { scale: 3, useCORS: true });
            const a = document.createElement('a');
            a.download = `Slide-${i+1}.png`;
            a.href = canvas.toDataURL('image/png');
            a.click();
            await new Promise(r => setTimeout(r, 600));
        }
    };
</script>
</body>
</html>
