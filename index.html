<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Premium Design Studio - Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        
        /* Kunci Rasio Instagram */
        .ratio-square .instagram-slide { width: 450px !important; height: 450px !important; flex-shrink: 0; }
        .ratio-story .instagram-slide { width: 360px !important; height: 640px !important; flex-shrink: 0; }

        .instagram-slide { background: white; box-shadow: 0 30px 60px -12px rgba(0,0,0,0.2); overflow: hidden; border-radius: 8px; }
        .font-arabic { font-family: 'Amiri', serif; line-height: 1.8; }
        #canvasBrosur { display: flex; flex-direction: column; gap: 40px; align-items: center; }

        .loading-active { @apply fixed inset-0 bg-slate-900/95 z-[100] flex flex-col items-center justify-center text-white; }
    </style>
</head>
<body class="p-4 md:p-10">

<div id="loading" class="hidden loading-active">
    <div class="w-14 h-14 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-6"></div>
    <p id="loadingText" class="text-xs font-black tracking-widest uppercase">Processing...</p>
</div>

<div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
    
    <!-- PANEL INPUT (KIRI) -->
    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 space-y-6">
        <div class="flex justify-between items-center border-b pb-4">
            <h1 class="text-2xl font-black">Design Studio</h1>
            <div class="flex gap-2">
                <input type="text" id="loadId" placeholder="ID" class="w-16 p-2 border rounded-xl text-center text-xs font-bold bg-slate-50">
                <button id="btnLoad" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold hover:bg-black transition">LOAD</button>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Nama Pesantren</label>
                <input type="text" id="infoTeks" class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 transition outline-none" placeholder="Masukkan nama pesantren...">
            </div>

            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Materi & Teks Arab</label>
                <textarea id="catatanTambahan" rows="5" class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 transition text-sm font-arabic outline-none" placeholder="Tempel materi di sini..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Format</label>
                    <select id="formatBrosur" class="w-full p-4 bg-slate-50 border-none rounded-2xl text-xs font-bold outline-none">
                        <option value="ratio-square">Post 1:1</option>
                        <option value="ratio-story">Story 9:16</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Slide</label>
                    <select id="jumlahGambar" class="w-full p-4 bg-slate-50 border-none rounded-2xl text-xs font-bold outline-none">
                        <option value="4">4 Slide</option>
                        <option value="6" selected>6 Slide</option>
                        <option value="8">8 Slide</option>
                    </select>
                </div>
            </div>

            <!-- BAGIAN GALERI FOTO (UPLOAD & PASTE) -->
            <div class="p-6 bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200">
                <label class="text-[10px] font-black uppercase text-slate-400 block mb-3 text-center">🖼️ Galeri Foto (Bisa Upload atau Paste)</label>
                
                <div class="flex flex-col items-center gap-4">
                    <!-- Tombol Upload Manual -->
                    <input type="file" id="fotoInput" multiple accept="image/*" class="hidden">
                    <label for="fotoInput" class="bg-white border border-slate-200 px-6 py-3 rounded-full text-[10px] font-black cursor-pointer hover:bg-slate-100 transition shadow-sm">
                        📁 PILIH FILE FOTO
                    </label>

                    <div class="text-[9px] text-slate-400 text-center font-medium">
                        Atau tekan <span class="bg-slate-200 px-1 rounded text-slate-700 font-bold">Ctrl + V</span> untuk paste screenshot
                    </div>

                    <!-- Indikator Jumlah Foto -->
                    <div id="fotoCounter" class="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-full text-[10px] font-black hidden">
                        0 FOTO TERSIMPAN
                    </div>
                </div>
            </div>

            <button id="btnGenerate" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-5 rounded-2xl transition shadow-xl active:scale-95">
                GENERATE DESIGN ✨
            </button>
        </div>

        <div id="saveArea" class="hidden p-6 bg-emerald-50 rounded-[2rem] border border-emerald-100 flex flex-col items-center">
            <button id="btnSave" class="bg-emerald-600 text-white px-8 py-3 rounded-2xl text-xs font-black shadow-lg">SIMPAN KE CLOUD ☁️</button>
            <div id="resultId" class="mt-4 text-xl font-black text-emerald-900 hidden tracking-widest">ID: <span id="displayId" class="underline"></span></div>
        </div>
    </div>

    <!-- PANEL PREVIEW (KANAN) -->
    <div class="flex flex-col items-center">
        <div id="canvasBrosur" class="ratio-square">
            <div class="instagram-slide flex flex-col items-center justify-center border-4 border-dashed border-slate-200 rounded-[2rem] bg-white p-10 text-center">
                <p class="text-slate-300 text-[10px] font-black uppercase tracking-widest">Preview Design Here</p>
            </div>
        </div>
        <button id="btnDownload" class="hidden mt-8 w-full max-w-[450px] bg-slate-900 text-white py-5 rounded-2xl font-black hover:bg-black shadow-2xl transition tracking-[0.2em] text-xs">
            DOWNLOAD ALL SLIDES (.PNG)
        </button>
    </div>
</div>

<script>
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwiLTj8sh6t9Zc6Znh1sdH_Y6u9TjOvMbo20jSRuhMRFOavsyHgkMnJr92ZTE_qEgJa/exec"; 

    let listFotoBase64 = [];
    let currentHtml = "";

    function updateCounter() {
        const counter = document.getElementById('fotoCounter');
        if (listFotoBase64.length > 0) {
            counter.innerText = listFotoBase64.length + " FOTO SIAP PROSES";
            counter.classList.remove('hidden');
        }
    }

    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 900;
                    const scale = MAX / Math.max(img.width, img.height);
                    canvas.width = img.width * scale; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                };
            };
        });
    }

    // Handle Paste Screenshot
    window.addEventListener('paste', async (e) => {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let item of items) {
            if (item.type.indexOf("image") !== -1) {
                const b64 = await compressImage(item.getAsFile());
                listFotoBase64.push(b64);
                updateCounter();
                showToast("📸 Screenshot Berhasil di-Paste!");
            }
        }
    });

    // Handle Upload Manual
    document.getElementById('fotoInput').onchange = async (e) => {
        for (let file of e.target.files) {
            listFotoBase64.push(await compressImage(file));
        }
        updateCounter();
        showToast("✅ " + e.target.files.length + " Foto Berhasil di-Upload");
    };

    document.getElementById('btnGenerate').onclick = async () => {
        const info = document.getElementById('infoTeks').value;
        if (!info || listFotoBase64.length === 0) return alert("Wajib isi Nama Pesantren dan minimal 1 Foto!");

        setLoading(true, "AI SEDANG MENDESAIN...");
        const format = document.getElementById('formatBrosur').value;
        document.getElementById('canvasBrosur').className = format;

        try {
            const res = await fetch(BACKEND_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'generate',
                    infoTeks: info,
                    catatanTambahan: document.getElementById('catatanTambahan').value,
                    formatBrosur: format,
                    jumlahGambar: document.getElementById('jumlahGambar').value,
                    modelBrosur: document.getElementById('modelBrosur').value,
                    listFotoBase64: listFotoBase64
                })
            });
            const data = await res.json();
            if (data.success) {
                currentHtml = data.html;
                document.getElementById('canvasBrosur').innerHTML = data.html;
                document.getElementById('btnDownload').classList.remove('hidden');
                document.getElementById('saveArea').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        } catch (e) { alert("Error: Periksa Koneksi!"); }
        setLoading(false);
    };

    document.getElementById('btnSave').onclick = async () => {
        setLoading(true, "SIMPAN KE CLOUD...");
        const res = await fetch(BACKEND_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'save', html: currentHtml, infoTeks: document.getElementById('infoTeks').value })
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('resultId').classList.remove('hidden');
            document.getElementById('displayId').innerText = data.projectId;
        }
        setLoading(false);
    };

    document.getElementById('btnLoad').onclick = async () => {
        const id = document.getElementById('loadId').value;
        if (!id) return;
        setLoading(true, "LOAD DARI CLOUD...");
        const res = await fetch(BACKEND_URL, { method: 'POST', body: JSON.stringify({ action: 'load', projectId: id }) });
        const data = await res.json();
        if (data.success) {
            document.getElementById('canvasBrosur').innerHTML = data.html;
            document.getElementById('btnDownload').classList.remove('hidden');
            showToast("📂 Project Dimuat!");
        } else { alert("ID Salah!"); }
        setLoading(false);
    };

    document.getElementById('btnDownload').onclick = async () => {
        const slides = document.querySelectorAll('.instagram-slide');
        for (let i = 0; i < slides.length; i++) {
            const canvas = await html2canvas(slides[i], { scale: 3, useCORS: true });
            const a = document.createElement('a');
            a.download = `Slide-${i+1}.png`;
            a.href = canvas.toDataURL();
            a.click();
            await new Promise(r => setTimeout(r, 600));
        }
    };

    function setLoading(s, t) {
        document.getElementById('loading').classList.toggle('hidden', !s);
        document.getElementById('loadingText').innerText = t;
    }

    function showToast(m) {
        const t = document.createElement('div');
        t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-[10px] font-black z-[200] animate-bounce";
        t.innerText = m; document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }
</script>
</body>
</html>
