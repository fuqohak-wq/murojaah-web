<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pesantren Premium Studio - Light Edition</title>
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9; 
            color: #1e293b; 
        }
        
        /* KUNCI RASIO PREVIEW */
        .ratio-square .instagram-slide { width: 450px !important; height: 450px !important; flex-shrink: 0; }
        .ratio-story .instagram-slide { width: 360px !important; height: 640px !important; flex-shrink: 0; }
        .ratio-a4 .instagram-slide { width: 450px !important; height: 636px !important; flex-shrink: 0; }

        .instagram-slide { 
            background: white; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2); 
            border-radius: 12px; 
            overflow: hidden; 
        }

        #canvasBrosur { 
            display: flex; 
            flex-direction: column; 
            gap: 40px; 
            align-items: center; 
            padding: 40px 0; 
        }

        /* Styling Form Versi Cerah */
        .form-card { 
            background: white; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); 
        }

        input, textarea, select { 
            background: #f8fafc !important; 
            border: 1px solid #e2e8f0 !important; 
            color: #1e293b !important; 
            outline: none; 
            transition: all 0.2s;
        }

        input:focus, textarea:focus { 
            border-color: #10b981 !important; 
            background: white !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .font-arabic { font-family: 'Amiri', serif; }
        .font-heading { font-family: 'Cinzel', serif; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">

<!-- Loading UI -->
<div id="loading" class="hidden fixed inset-0 bg-white/90 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
    <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p id="loadingText" class="text-sm font-extrabold tracking-widest uppercase text-emerald-600">AI Sedang Merancang Mahakarya...</p>
</div>

<div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
    
    <!-- PANEL KONTROL (KIRI) -->
    <div class="lg:col-span-5 form-card p-8 rounded-[2.5rem] space-y-6">
        <div class="flex justify-between items-center border-b border-slate-100 pb-5">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Studio AI <span class="text-emerald-600">Premium</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pesantren Edition</p>
            </div>
            <div class="flex gap-2">
                <input type="text" id="loadId" placeholder="ID" class="w-16 p-2 rounded-xl text-center text-xs font-bold shadow-sm">
                <button id="btnLoad" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold hover:bg-black transition">LOAD</button>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block ml-1">Nama Pesantren / Judul</label>
                <input type="text" id="infoTeks" class="w-full p-4 rounded-2xl text-sm font-semibold" placeholder="Contoh: Pondok Pesantren Miftahul Ulum">
            </div>

            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block ml-1">Materi & Teks Arab</label>
                <textarea id="catatanTambahan" rows="4" class="w-full p-4 rounded-2xl text-sm font-arabic" placeholder="Tempel teks Arab dan materi di sini..."></textarea>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block">Format</label>
                    <select id="formatBrosur" class="w-full p-3 rounded-xl text-[10px] font-bold">
                        <option value="ratio-square">FEED 1:1</option>
                        <option value="ratio-story">STORY 9:16</option>
                        <option value="ratio-a4">CETAK A4</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block">Slide</label>
                    <select id="jumlahGambar" class="w-full p-3 rounded-xl text-[10px] font-bold">
                        <!-- Diisi via JS -->
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block">Tema</label>
                    <select id="modelBrosur" class="w-full p-3 rounded-xl text-[10px] font-bold">
                        <option value="Emerald Gold">Emerald</option>
                        <option value="Black Gold">Black</option>
                        <option value="Royal Blue">Blue</option>
                        <option value="Tradisional">Classic</option>
                        <option value="Ceria">Pastel</option>
                    </select>
                </div>
            </div>

            <!-- AREA UPLOAD FOTO -->
            <div class="p-6 bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200 flex flex-col items-center gap-3">
                <input type="file" id="fotoInput" multiple accept="image/*" class="hidden">
                <label for="fotoInput" class="bg-emerald-600 text-white px-8 py-3 rounded-full text-[10px] font-black cursor-pointer hover:bg-emerald-700 transition shadow-md">PILIH FILE FOTO</label>
                <p class="text-[9px] text-slate-400 font-bold uppercase">Atau Paste Screenshot <span class="text-emerald-600">(Ctrl+V)</span></p>
                <div id="fotoCounter" class="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full text-[10px] font-black hidden">0 FOTO SIAP</div>
            </div>

            <button id="btnGenerate" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-5 rounded-2xl transition shadow-xl shadow-emerald-100 active:scale-95 text-xs tracking-widest uppercase">
                MULAI DESAIN SEKARANG ✨
            </button>
        </div>

        <div id="saveArea" class="hidden p-6 bg-emerald-50 rounded-[2.5rem] border border-emerald-100 flex flex-col items-center animate-bounce">
            <button id="btnSave" class="bg-emerald-600 text-white px-10 py-3 rounded-2xl text-[10px] font-black shadow-lg uppercase tracking-widest">SIMPAN KE CLOUD ☁️</button>
            <div id="resultId" class="mt-4 text-2xl font-black text-emerald-700 hidden tracking-[0.2em]">ID: <span id="displayId" class="underline"></span></div>
        </div>
    </div>

    <!-- PANEL PREVIEW (KANAN) -->
    <div class="lg:col-span-7 flex flex-col items-center">
        <div class="w-full max-w-[450px] flex justify-between items-end mb-6">
            <h2 class="text-xs font-black tracking-[0.3em] text-slate-400 uppercase">Live Preview Showcase</h2>
            <div class="h-2 w-2 bg-emerald-500 rounded-full animate-ping"></div>
        </div>

        <div id="canvasBrosur" class="ratio-square">
            <div class="instagram-slide flex flex-col items-center justify-center border-4 border-dashed border-slate-200 bg-white p-12 text-slate-300 text-[10px] font-black uppercase tracking-widest text-center">
                <p>Belum Ada Desain<br>Silakan Input Data & Foto</p>
            </div>
        </div>

        <button id="btnDownload" class="hidden mt-10 w-full max-w-[450px] bg-slate-900 text-white font-black py-6 rounded-[2.5rem] shadow-2xl hover:bg-black transition tracking-[0.4em] text-[10px] uppercase">
            Download Semua Slide (PNG)
        </button>
    </div>
</div>

<script>
    // PENTING: Ganti URL ini dengan URL Web App dari Google Script Anda
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwiLTj8sh6t9Zc6Znh1sdH_Y6u9TjOvMbo20jSRuhMRFOavsyHgkMnJr92ZTE_qEgJa/exec"; 

    // Isi Dropdown Slide 1-10
    const selectSlide = document.getElementById('jumlahGambar');
    for(let i=1; i<=10; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = i + " SLIDE";
        if(i===5) opt.selected = true;
        selectSlide.appendChild(opt);
    }

    let listFotoBase64 = [];
    let currentHtml = "";

    function updateCounter() {
        const c = document.getElementById('fotoCounter');
        if (listFotoBase64.length > 0) {
            c.innerText = listFotoBase64.length + " FOTO SIAP PROSES";
            c.classList.remove('hidden');
        }
    }

    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 1000;
                    const scale = MAX / Math.max(img.width, img.height);
                    canvas.width = img.width * scale; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                };
            };
        });
    }

    // Paste Screenshot Listener
    window.addEventListener('paste', async (e) => {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let item of items) {
            if (item.type.indexOf("image") !== -1) {
                listFotoBase64.push(await compressImage(item.getAsFile()));
                updateCounter();
                showToast("📸 Screenshot di-paste!");
            }
        }
    });

    document.getElementById('fotoInput').onchange = async (e) => {
        for (let file of e.target.files) {
            listFotoBase64.push(await compressImage(file));
        }
        updateCounter();
    };

    // Tombol Generate
    document.getElementById('btnGenerate').onclick = async () => {
        const info = document.getElementById('infoTeks').value;
        if (!info || listFotoBase64.length === 0) return alert("Isi Nama & Masukkan Foto (Upload/Paste)!");

        setLoading(true, "AI SEDANG MENDESAIN...");
        const format = document.getElementById('formatBrosur').value;
        
        try {
            const res = await fetch(BACKEND_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'generate',
                    infoTeks: info,
                    catatanTambahan: document.getElementById('catatanTambahan').value,
                    formatBrosur: format,
                    jumlahGambar: document.getElementById('jumlahGambar').value,
                    modelBrosur: document.getElementById('modelBrosur').value,
                    listFotoBase64: listFotoBase64
                })
            });
            const data = await res.json();
            if (data.success) {
                currentHtml = data.html;
                const canvas = document.getElementById('canvasBrosur');
                canvas.innerHTML = data.html;
                canvas.className = format;
                document.getElementById('btnDownload').classList.remove('hidden');
                document.getElementById('saveArea').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        } catch (e) { alert("Error! Periksa URL Web App."); }
        setLoading(false);
    };

    // Tombol Download
    document.getElementById('btnDownload').onclick = async function() {
        const slides = document.querySelectorAll('.instagram-slide');
        setLoading(true, "MENGUNDUH GAMBAR...");
        for (let i = 0; i < slides.length; i++) {
            const canvas = await html2canvas(slides[i], { scale: 3, useCORS: true });
            const link = document.createElement('a');
            link.download = `Slide-${i+1}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            await new Promise(r => setTimeout(r, 800));
        }
        setLoading(false);
    };

    // Tombol Save ke Sheet
    document.getElementById('btnSave').onclick = async () => {
        setLoading(true, "MENYIMPAN KE CLOUD...");
        const res = await fetch(BACKEND_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'save', html: currentHtml, infoTeks: document.getElementById('infoTeks').value })
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('resultId').classList.remove('hidden');
            document.getElementById('displayId').innerText = data.projectId;
        }
        setLoading(false);
    };

    // Tombol Load Project
    document.getElementById('btnLoad').onclick = async () => {
        const id = document.getElementById('loadId').value;
        if(!id) return;
        setLoading(true, "MEMUAT DARI CLOUD...");
        const res = await fetch(BACKEND_URL, { method: 'POST', body: JSON.stringify({ action: 'load', projectId: id }) });
        const data = await res.json();
        if (data.success) {
            document.getElementById('canvasBrosur').innerHTML = data.html;
            document.getElementById('btnDownload').classList.remove('hidden');
            showToast("📂 Project Dimuat!");
        } else { alert("ID Tidak Ditemukan."); }
        setLoading(false);
    };

    function setLoading(s, t) { 
        document.getElementById('loading').classList.toggle('hidden', !s); 
        document.getElementById('loadingText').innerText = t; 
    }

    function showToast(m) {
        const t = document.createElement('div');
        t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-full text-[10px] font-black z-[200] animate-bounce shadow-xl";
        t.innerText = m; document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }
</script>
</body>
</html>
