<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pesantren Brochure Generator</title>
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        
        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 1.25rem;
            border: 2px dashed #cbd5e1;
        }

        #canvasBrosur {
            width: 100%;
            max-width: 400px; 
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Rasio Dinamis */
        .ratio-1-1 .instagram-slide { aspect-ratio: 1 / 1; }
        .ratio-9-16 .instagram-slide { aspect-ratio: 9 / 16; }
        .ratio-a4 .instagram-slide { aspect-ratio: 1 / 1.414; }

        .instagram-slide {
            width: 100%;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

<div id="loading" class="loading-overlay hidden">
    <div class="text-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-emerald-600 border-slate-200 mx-auto mb-4"></div>
        <p class="font-bold text-slate-900">AI Sedang Mendesain Carousel Anda...</p>
        <p class="text-sm text-slate-500">Menganalisis foto & menyusun layout infografis</p>
    </div>
</div>

<div class="max-w-6xl mx-auto px-4 py-10">
    <header class="text-center mb-10">
        <span class="bg-emerald-100 text-emerald-800 text-xs font-bold px-3 py-1 rounded-full uppercase">Gemini AI Power</span>
        <h1 class="text-3xl font-extrabold text-slate-900 mt-2">AI Pesantren Brochure Generator</h1>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Input Panel -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Nama Pesantren & Info Utama</label>
                    <textarea id="infoTeks" rows="2" class="w-full p-3 border rounded-xl text-sm" placeholder="Contoh: Pondok Pesantren Al-Falah, Kediri. Pendaftaran 2025."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Fasilitas & Keunggulan</label>
                    <textarea id="catatanTambahan" rows="3" class="w-full p-3 border rounded-xl text-sm" placeholder="Misal: Tahfidz 30 Juz, Kamar mandi dalam, Lab Komputer..."></textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Format</label>
                        <select id="formatBrosur" class="w-full p-2.5 border rounded-xl text-sm bg-white">
                            <option value="1:1">Instagram Feed (1:1)</option>
                            <option value="9:16">Instagram Story (9:16)</option>
                            <option value="a4">Cetak A4 (Portrait)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Jumlah Slide</label>
                        <select id="jumlahGambar" class="w-full p-2.5 border rounded-xl text-sm bg-white">
                            <option value="3">3 Slide</option>
                            <option value="4">4 Slide</option>
                            <option value="5" selected>5 Slide</option>
                            <option value="6">6 Slide</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">Tema Warna</label>
                    <select id="modelBrosur" class="w-full p-2.5 border rounded-xl text-sm bg-white">
                        <option value="Tradisional Islami (Mewah/Gold)">Tradisional Islami (Gold/Emerald)</option>
                        <option value="Modern & Minimalis">Modern & Minimalis (Blue/White)</option>
                        <option value="Ceria & Edukatif (Anak-anak)">Ceria & Edukatif (Pastel)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">Upload Foto Pondok (Min 1, Maks 6)</label>
                    <input type="file" id="fotoInput" accept="image/*" multiple class="w-full text-sm">
                </div>

                <button id="btnGenerate" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition shadow-lg">
                    Mulai Desain Otomatis ✨
                </button>
            </div>
        </div>

        <!-- Preview Panel -->
        <div class="flex flex-col gap-4">
            <h2 class="text-xl font-bold">Pratinjau Hasil</h2>
            <div class="preview-container">
                <div id="canvasBrosur" class="ratio-1-1">
                    <div class="instagram-slide p-10 text-center flex items-center justify-center text-slate-400 border">
                        Desain akan muncul di sini...
                    </div>
                </div>
            </div>
            <button id="btnDownload" class="hidden w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition">
                📥 Download Semua Slide (.PNG)
            </button>
        </div>
    </div>
</div>

<script>
    // GANTI INI DENGAN URL WEB APP ANDA
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwiLTj8sh6t9Zc6Znh1sdH_Y6u9TjOvMbo20jSRuhMRFOavsyHgkMnJr92ZTE_qEgJa/exec"; 

    let listFotoBase64 = [];

    document.getElementById('fotoInput').addEventListener('change', async function(e) {
        listFotoBase64 = [];
        const files = e.target.files;
        for (let file of files) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const base64 = event.target.result.split(',')[1];
                listFotoBase64.push(base64);
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('btnGenerate').addEventListener('click', async () => {
        const infoTeks = document.getElementById('infoTeks').value;
        if (!infoTeks || listFotoBase64.length === 0) {
            alert("Harap isi Info Utama dan unggah foto!");
            return;
        }

        const format = document.getElementById('formatBrosur').value;
        const canvas = document.getElementById('canvasBrosur');
        canvas.className = "ratio-" + format;

        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('btnDownload').classList.add('hidden');

        try {
            const formData = new URLSearchParams();
            formData.append('infoTeks', infoTeks);
            formData.append('catatanTambahan', document.getElementById('catatanTambahan').value);
            formData.append('formatBrosur', format);
            formData.append('jumlahGambar', document.getElementById('jumlahGambar').value);
            formData.append('modelBrosur', document.getElementById('modelBrosur').value);
            formData.append('listFotoBase64', JSON.stringify(listFotoBase64));

            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            if (data.success) {
                canvas.innerHTML = data.html;
                document.getElementById('btnDownload').classList.remove('hidden');
            } else {
                alert("Kesalahan: " + data.error);
            }
        } catch (err) {
            alert("Koneksi gagal! Pastikan BACKEND_URL benar.");
        } finally {
            document.getElementById('loading').classList.add('hidden');
        }
    });

    async function downloadBrosur() {
        const slides = document.querySelectorAll('.instagram-slide');
        for (let i = 0; i < slides.length; i++) {
            const canvas = await html2canvas(slides[i], { scale: 2, useCORS: true });
            const link = document.createElement('a');
            link.download = `slide-${i+1}.png`;
            link.href = canvas.toDataURL();
            link.click();
            await new Promise(r => setTimeout(r, 500));
        }
    }
    document.getElementById('btnDownload').onclick = downloadBrosur;
</script>
</body>
</html>
