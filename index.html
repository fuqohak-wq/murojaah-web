<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Brochure Pro - Fast Version</title>
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        .ratio-square .instagram-slide { aspect-ratio: 1 / 1 !important; width: 100%; max-width: 500px; }
        .instagram-slide { background: white; overflow: hidden; display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .font-arabic { font-family: 'Amiri', serif; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="py-10 px-4">

<div id="loading" class="hidden fixed inset-0 bg-slate-900/90 z-50 flex flex-col items-center justify-center text-white">
    <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-lg font-bold">Sedang Memproses... (Biasanya 10-20 detik)</p>
    <p class="text-sm text-slate-400">Mengompres gambar & Menghubungi AI</p>
</div>

<div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
    <!-- Panel Kiri -->
    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 space-y-5">
        <h1 class="text-2xl font-black text-slate-800">Brosur AI Pro ✨</h1>
        
        <div>
            <label class="block text-sm font-bold mb-1">Nama Pesantren</label>
            <input type="text" id="infoTeks" class="w-full p-3 bg-slate-50 border rounded-xl" placeholder="Miftahul Ulum...">
        </div>

        <div>
            <label class="block text-sm font-bold mb-1">Teks / Fasilitas (Termasuk Teks Arab)</label>
            <textarea id="catatanTambahan" rows="5" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-arabic" placeholder="Tempel teks Arab atau info fasilitas di sini..."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-bold mb-1">Jumlah Slide</label>
                <select id="jumlahGambar" class="w-full p-3 bg-slate-50 border rounded-xl">
                    <option value="3">3 Slide</option>
                    <option value="5" selected>5 Slide</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">Tema Warna</label>
                <select id="modelBrosur" class="w-full p-3 bg-slate-50 border rounded-xl">
                    <option value="Mewah (Emerald Gold)">Emerald Gold</option>
                    <option value="Eksklusif (Black Gold)">Black Gold</option>
                    <option value="Modern (White Blue)">Modern Blue</option>
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-bold mb-1">Upload Foto Pondok</label>
            <input type="file" id="fotoInput" multiple accept="image/*" class="w-full text-sm">
            <p class="text-[10px] text-slate-400 mt-1">*Foto akan dikompres otomatis agar proses cepat</p>
        </div>

        <button id="btnGenerate" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-2xl hover:bg-emerald-700 transition shadow-lg shadow-emerald-200">
            MULAI DESAIN OTOMATIS
        </button>
    </div>

    <!-- Panel Kanan -->
    <div class="space-y-6">
        <h2 class="text-xl font-bold text-slate-800">Pratinjau Hasil</h2>
        <div id="canvasBrosur" class="ratio-square flex flex-col gap-8 items-center">
            <div class="instagram-slide p-10 items-center justify-center border-2 border-dashed border-slate-300 rounded-2xl text-slate-400">
                Hasil akan muncul di sini...
            </div>
        </div>
        <button id="btnDownload" class="hidden w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl">
            📥 DOWNLOAD SEMUA SLIDE (PNG)
        </button>
    </div>
</div>

<script>
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwiLTj8sh6t9Zc6Znh1sdH_Y6u9TjOvMbo20jSRuhMRFOavsyHgkMnJr92ZTE_qEgJa/exec"; 

    let listFotoBase64 = [];

    // Fungsi Kompresi Gambar agar pengiriman data ringan
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // Ukuran cukup untuk Instagram
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]); // Kompres kualitas 70%
                };
            };
        });
    }

    document.getElementById('fotoInput').addEventListener('change', async (e) => {
        listFotoBase64 = [];
        const files = e.target.files;
        for (let file of files) {
            const compressed = await compressImage(file);
            listFotoBase64.push(compressed);
        }
    });

    document.getElementById('btnGenerate').onclick = async () => {
        const info = document.getElementById('infoTeks').value;
        if (!info || listFotoBase64.length === 0) return alert("Isi Nama & Foto!");

        document.getElementById('loading').classList.remove('hidden');
        
        try {
            // Gunakan JSON Body (lebih stabil untuk data besar)
            const payload = {
                infoTeks: info,
                catatanTambahan: document.getElementById('catatanTambahan').value,
                jumlahGambar: document.getElementById('jumlahGambar').value,
                modelBrosur: document.getElementById('modelBrosur').value,
                listFotoBase64: listFotoBase64
            };

            const res = await fetch(BACKEND_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            
            const data = await res.json();
            if (data.success) {
                document.getElementById('canvasBrosur').innerHTML = data.html;
                document.getElementById('btnDownload').classList.remove('hidden');
            } else {
                alert("Gagal: " + data.error);
            }
        } catch (e) {
            alert("Timeout atau Koneksi Terputus. Pastikan URL Script benar & Deploy sebagai 'Anyone'.");
        } finally {
            document.getElementById('loading').classList.add('hidden');
        }
    };

    document.getElementById('btnDownload').onclick = async () => {
        const slides = document.querySelectorAll('.instagram-slide');
        for (let i = 0; i < slides.length; i++) {
            const canvas = await html2canvas(slides[i], { scale: 2 });
            const a = document.createElement('a');
            a.download = `Brosur-Slide-${i+1}.png`;
            a.href = canvas.toDataURL();
            a.click();
            await new Promise(r => setTimeout(r, 500));
        }
    };
</script>
</body>
</html>
