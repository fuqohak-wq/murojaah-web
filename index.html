<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Brosur AI - PPMUY</title>
    <!-- Tailwind CSS untuk keindahan tata letak -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Library html2canvas untuk fitur unduh slide secara utuh tanpa terpotong -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen pb-12">

    <div class="max-w-4xl mx-auto mt-8 p-6 bg-white rounded-xl shadow-md">
        <h1 class="text-3xl font-bold text-emerald-800 text-center mb-6">Pembuat Brosur AI PPMUY</h1>
        
        <!-- FORM PENGIRIMAN DATA -->
        <!-- target="target_frame" inilah yang membuat aplikasi ini 100% kebal terhadap error CORS browser -->
        <form id="formBrosur" action="" method="POST" target="target_frame" class="space-y-4">
            
            <div>
                <label class="block font-medium text-gray-700 mb-1">Informasi Utama Pesantren:</label>
                <textarea name="infoTeks" id="infoTeks" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none h-28" placeholder="Masukkan visi, misi, atau program unggulan PPMUY..."></textarea>
            </div>

            <div>
                <label class="block font-medium text-gray-700 mb-1">Catatan Tambahan (Fasilitas/Biaya dll):</label>
                <textarea name="catatanTambahan" id="catatanTambahan" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none h-20" placeholder="Pendaftaran gelombang 1 gratis seragam..."></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block font-medium text-gray-700 mb-1">Format Media:</label>
                    <select name="formatBrosur" id="formatBrosur" class="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
                        <option>Poster Instagram (1:1)</option>
                        <option>Cerita Instagram (9:16)</option>
                        <option>Brosur Lipat A4</option>
                    </select>
                </div>
                <div>
                    <label class="block font-medium text-gray-700 mb-1">Model Desain:</label>
                    <select name="modelBrosur" id="modelBrosur" class="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
                        <option>Modern & Minimalis</option>
                        <option>Islami Tradisional</option>
                        <option>Elegant & Premium</option>
                    </select>
                </div>
                <div>
                    <label class="block font-medium text-gray-700 mb-1">Maksimal Gambar:</label>
                    <select name="jumlahGambar" id="jumlahGambar" class="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
                        <option value="1">1 Gambar</option>
                        <option value="2">2 Gambar</option>
                        <option value="3">3 Gambar</option>
                        <option value="4">4 Gambar</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block font-medium text-gray-700 mb-1">Gaya Visual:</label>
                <select name="gayaVisual" id="gayaVisual" class="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
                    <option value="asli">Nuansa Islami Asli (Hijau & Emas)</option>
                    <option value="bright">Cerah & Dinamis</option>
                </select>
            </div>

            <div>
                <label class="block font-medium text-gray-700 mb-1">Unggah Foto Pendukung:</label>
                <input type="file" id="inputFoto" multiple accept="image/*" class="w-full p-2 border border-gray-200 rounded-lg file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
            </div>

            <!-- Input tersembunyi untuk mengirimkan kumpulan string base64 gambar -->
            <input type="hidden" name="listFotoBase64" id="listFotoBase64">

            <button type="submit" id="btnGenerate" class="w-full py-3 bg-emerald-700 hover:bg-emerald-800 text-white font-bold rounded-lg shadow transition duration-200 cursor-pointer text-center">
                Mulai Rancang Brosur dengan AI
            </button>
        </form>

        <!-- LOADING AREA -->
        <div id="loading" class="hidden text-center my-6">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-700 mx-auto"></div>
            <p class="text-emerald-700 font-medium mt-2">AI sedang menganalisis data & menyusun struktur brosur...</p>
        </div>

        <!-- AREA HASIL GENERATE BROSUR -->
        <div id="canvasBrosur" class="mt-8 border border-gray-200 rounded-xl overflow-hidden bg-white shadow-inner"></div>

        <!-- AREA TOMBOL UNDUH -->
        <div id="downloadArea" class="hidden text-center mt-6">
            <button id="btnDownload" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow transition cursor-pointer">
                Unduh Hasil Brosur (.PNG)
            </button>
        </div>
    </div>

    <!-- INILAH KUNCI UTAMANYA: IFRAME TERSEMBUNYI UNTUK MENERIMA DATA BALIKAN BACKEND -->
    <iframe name="target_frame" id="target_frame" class="hidden"></iframe>

    <script>
        // MASUKKAN URL DEPLOYMENT APPS SCRIPT ANDA DI SINI
        const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwiLTj8sh6t9Zc6Znh1sdH_Y6u9TjOvMbo20jSRuhMRFOavsyHgkMnJr92ZTE_qEgJa/exec";

        const form = document.getElementById('formBrosur');
        form.action = BACKEND_URL;

        let arrayFotoBase64 = [];

        // Membaca file gambar lokal dan mengubahnya ke string Base64 sebelum form dikirim
        document.getElementById('inputFoto').addEventListener('change', function(e) {
            arrayFotoBase64 = [];
            const files = e.target.files;
            
            for(let i=0; i<files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    arrayFotoBase64.push(event.target.result);
                    document.getElementById('listFotoBase64').value = JSON.stringify(arrayFotoBase64);
                };
                reader.readAsDataURL(files[i]);
            }
        });

        // Event saat tombol submit ditekan
        form.addEventListener('submit', () => {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('canvasBrosur').innerHTML = '';
            document.getElementById('downloadArea').classList.add('hidden');
            document.getElementById('btnGenerate').disabled = true;
        });

        // MENDENGARKAN DATA DARI IFRAME (Menerima respon sukses dari Google Apps Script tanpa hambatan CORS)
        window.addEventListener('message', function(event) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('btnGenerate').disabled = false;
            
            const data = event.data;
            if (data && typeof data === 'object') {
                if (data.success) {
                    document.getElementById('canvasBrosur').innerHTML = data.html;
                    document.getElementById('downloadArea').classList.remove('hidden');
                } else {
                    alert("Gagal merancang brosur: " + data.error);
                }
            }
        });

        // Fungsi mengunduh area brosur menjadi file gambar utuh menggunakan html2canvas
        document.getElementById('btnDownload').addEventListener('click', () => {
            const areaBrosur = document.getElementById('canvasBrosur');
            html2canvas(areaBrosur, { useCORS: true, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Brosur-PPMUY-' + Date.now() + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
