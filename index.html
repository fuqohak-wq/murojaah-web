<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pesantren Brochure Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Html2Canvas untuk Download Gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto px-4 py-10">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-emerald-700 mb-2">Brosur Pesantren AI Generator</h1>
            <p class="text-gray-600">Ubah banyak foto mentah menjadi brosur profesional bertenaga AI Gemini</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <!-- Form Input (Kiri) -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Konfigurasi Brosur</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Apa yang ingin ditulis? (Informasi/Nama Pesantren)</label>
                        <textarea id="infoTeks" rows="3" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="Contoh: Pesantren Al-Ikhlas, menerima santri baru 2026. Fasilitas lengkap, tahfidz Al-Quran..."></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Format Brosur (Ukuran/Layout)</label>
                        <select id="formatBrosur" class="w-full p-3 border rounded-lg bg-white">
                            <option value="Poster Instagram (1:1)">Poster Instagram (1:1)</option>
                            <option value="Pamflet Story (9:16)">Pamflet Story (9:16)</option>
                            <option value="Brosur Cetak A4 (Portrait)">Brosur Cetak A4 (Portrait)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Model / Tema Brosur</label>
                        <select id="modelBrosur" class="w-full p-3 border rounded-lg bg-white">
                            <option value="Modern & Minimalis">Modern & Minimalis</option>
                            <option value="Tradisional Islami (Mewah/Gold)">Tradisional Islami (Mewah/Gold)</option>
                            <option value="Ceria & Edukatif (Anak-anak)">Ceria & Edukatif (Anak-anak)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Mode Gaya Visual Foto</label>
                        <select id="gayaVisual" class="w-full p-3 border rounded-lg bg-white">
                            <option value="asli">Asli (Elegan & Natural)</option>
                            <option value="kartun">Kartun / Ilustratif (Pop Art)</option>
                            <option value="vintage">Vintage / Estetik Klasik</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Upload Foto-Foto Pesantren (Bisa pilih banyak)</label>
                        <input type="file" id="fotoInput" accept="image/*" multiple class="w-full p-2 border rounded-lg">
                        <p class="text-xs text-gray-400 mt-1">*Anda bisa memilih lebih dari 1 foto sekaligus (Tahan Ctrl / Shift + Klik foto).</p>
                    </div>

                    <button id="btnGenerate" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 rounded-lg transition">
                        Buat Brosur Otomatis ✨
                    </button>
                </div>
            </div>

            <!-- Preview & Unduh (Kanan) -->
            <div class="flex flex-col items-center">
                <div class="w-full bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-4 min-h-[400px] flex items-center justify-center relative overflow-hidden">
                    <div id="loading" class="hidden text-center z-10">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-600 mx-auto mb-2"></div>
                        <p class="text-sm text-gray-500">AI sedang mendesain brosur Anda...</p>
                    </div>
                    
                    <!-- Tempat Hasil Render HTML dari Gemini -->
                    <div id="canvasBrosur" class="w-full h-full">
                        <p id="placeholderText" class="text-gray-400 text-center">Hasil brosur AI akan muncul di sini</p>
                    </div>
                </div>

                <!-- Tombol Download Gambar -->
                <div id="downloadArea" class="hidden gap-2 w-full">
                    <button onclick="downloadBrosur('png')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-medium text-center cursor-pointer">Download PNG</button>
                    <button onclick="downloadBrosur('jpeg')" class="flex-1 bg-gray-800 hover:bg-gray-900 text-white py-2 rounded-lg font-medium text-center cursor-pointer">Download JPG</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Menggunakan Web App URL milik Anda
        const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwEsQd5f0yMGvGskfGBNSUcVUz6mC65o_OHJmP5QTTHi1jjgwH1_EspW9vT-1wxtlzqZw/exec"; 

        let listFotoBase64 = []; 

        // Mengubah banyak file gambar ke Array Base64 secara asinkron
        document.getElementById('fotoInput').addEventListener('change', async function(e) {
            listFotoBase64 = []; 
            const files = e.target.files;
            
            if (files.length === 0) return;

            const readFileAsBase64 = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = function() {
                        const base64 = reader.result.replace(/^data:image\/(png|jpg|jpeg);base64,/, "");
                        resolve(base64);
                    }
                    reader.readAsDataURL(file);
                });
            };

            for (let i = 0; i < files.length; i++) {
                const base64Result = await readFileAsBase64(files[i]);
                listFotoBase64.push(base64Result);
            }
        });

        document.getElementById('btnGenerate').addEventListener('click', async () => {
            const infoTeks = document.getElementById('infoTeks').value;
            const formatBrosur = document.getElementById('formatBrosur').value;
            const modelBrosur = document.getElementById('modelBrosur').value;
            const gayaVisual = document.getElementById('gayaVisual').value;

            if (listFotoBase64.length === 0) {
                alert("Silakan unggah minimal satu foto pesantren!");
                return;
            }

            // Tampilkan Loading
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('placeholderText').classList.add('hidden');
            document.getElementById('canvasBrosur').innerHTML = "";
            document.getElementById('downloadArea').classList.add('hidden');

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        infoTeks, 
                        formatBrosur, 
                        modelBrosur, 
                        gayaVisual, 
                        listFotoBase64: listFotoBase64 
                    })
                });
                const data = await response.json();

                if (data.success) {
                    document.getElementById('canvasBrosur').innerHTML = data.html;
                    document.getElementById('downloadArea').classList.remove('hidden');
                } else {
                    alert("Gagal membuat brosur: " + data.error);
                }
            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan koneksi ke backend.");
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        });

        function downloadBrosur(format) {
            const element = document.getElementById('canvasBrosur');
            html2canvas(element, { useCORS: true, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `brosur-pesantren.${format}`;
                link.href = canvas.toDataURL(`image/${format}`, 0.9);
                link.click();
            });
        }
    </script>
</body>
</html>
