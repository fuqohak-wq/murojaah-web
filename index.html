<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pesantren Premium Studio - Perfection Edition</title>
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a; 
        }
            
        /* DIMENSI DESAIN ASLI */
        .ratio-square .instagram-slide { width: 1080px !important; height: 1080px !important; }
        .ratio-story .instagram-slide { width: 1080px !important; height: 1920px !important; }
        .ratio-a4 .instagram-slide { width: 1240px !important; height: 1754px !important; }

        /* SKALA VISUAL PREVIEW SCREEN */
        .ratio-square { transform: scale(0.38); transform-origin: top center; height: 410px; }
        .ratio-story { transform: scale(0.22); transform-origin: top center; height: 423px; }
        .ratio-a4 { transform: scale(0.24); transform-origin: top center; height: 422px; }
 
        #canvasOuter {
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            justify-content: flex-start;
            align-items: center;
            min-height: 500px;
        }

        .slide-container {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .form-card { 
            background: white; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); 
        }
 
        input, textarea, select { 
            background: #f8fafc !important; 
            border: 1px solid #cbd5e1 !important; 
            color: #0f172a !important; 
            outline: none; 
            transition: all 0.2s;
        }
 
        input:focus, textarea:focus, select:focus { 
            border-color: #059669 !important; 
            background: white !important;
            box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
        }
 
        .font-arabic { font-family: 'Amiri', serif !important; }
        .font-heading { font-family: 'Cinzel', serif !important; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12 bg-slate-50">
 
<!-- Loading UI -->
<div id="loading" class="hidden fixed inset-0 bg-slate-900/60 z-[100] flex flex-col items-center justify-center backdrop-blur-md">
    <div class="w-16 h-16 border-4 border-emerald-400 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p id="loadingText" class="text-sm font-black tracking-widest uppercase text-white animate-pulse">Memproses Sinkronisasi Gambar...</p>
</div>
 
<div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
    
    <!-- PANEL KONTROL -->
    <div class="lg:col-span-5 form-card p-8 rounded-[2.5rem] space-y-6 h-fit">
        <div class="flex justify-between items-center border-b border-slate-100 pb-5">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Studio AI <span class="text-emerald-600">Premium</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pesantren Edition v3</p>
            </div>
            <!-- PERBAIKAN DROPDOWN: Input teks ID manual diganti menjadi Dropdown otomatis -->
            <div class="flex gap-2 w-48 justify-end">
                <select id="loadId" class="w-full p-2 rounded-xl text-[10px] font-bold shadow-sm border border-slate-300 bg-white">
                    <option value="">Pilih Project...</option>
                </select>
                <button id="btnLoad" class="bg-slate-800 text-white px-3 py-2 rounded-xl text-[10px] font-bold hover:bg-black transition">LOAD</button>
            </div>
        </div>
 
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block ml-1">Nama Pesantren / Judul Banner</label>
                <input type="text" id="infoTeks" class="w-full p-4 rounded-2xl text-sm font-semibold" placeholder="Contoh: Pondok Pesantren Miftahul Ulum">
            </div>
 
            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block ml-1">Materi Utama & Catatan Kajian</label>
                <textarea id="catatanTambahan" rows="5" class="w-full p-4 rounded-2xl text-sm" placeholder="Tempel bahan tulisan, ayat, atau poin penting dakwah di sini..."></textarea>
            </div>
 
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block">Format Ukuran</label>
                    <select id="formatBrosur" class="w-full p-3 rounded-xl text-[10px] font-bold">
                        <option value="ratio-square">FEED 1:1</option>
                        <option value="ratio-story">STORY 9:16</option>
                        <option value="ratio-a4">CETAK A4</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block">Kombinasi Bahasa</label>
                    <select id="opsiBahasa" class="w-full p-3 rounded-xl text-[10px] font-bold border-emerald-500">
                        <option value="id-only">Indonesia Saja</option>
                        <option value="ar-id">Arab - Indonesia</option>
                        <option value="id-en">Indonesia - Inggris</option>
                        <option value="ar-en-id">Arab - Inggris - Indonesia</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block">Jumlah Slide</label>
                    <select id="jumlahGambar" class="w-full p-3 rounded-xl text-[10px] font-bold">
                        <!-- Diisi via JS -->
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block">Tema Warna (Termasuk Background)</label>
                    <select id="modelBrosur" class="w-full p-3 rounded-xl text-[10px] font-bold">
                        <option value="Emerald Gold">Emerald Luxury (Hijau Tua)</option>
                        <option value="Black Gold">Midnight Premium (Hitam Mewah)</option>
                        <option value="Royal Blue">Blue Ocean (Biru Safir)</option>
                        <option value="Tradisional">Classic Cream (Krem Klasik)</option>
                        <option value="Ceria">Warm Pastel (Kuning Ceria)</option>
                    </select>
                </div>
            </div>
 
            <div class="p-6 bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-300 flex flex-col items-center gap-3">
                <input type="file" id="fotoInput" multiple accept="image/*" class="hidden">
                <label for="fotoInput" class="bg-emerald-600 text-white px-8 py-3 rounded-full text-[10px] font-black cursor-pointer hover:bg-emerald-700 transition shadow-md">UPLOAD FILE FOTO</label>
                <p class="text-[9px] text-slate-400 font-bold uppercase">Atau Paste Screenshot langsung <span class="text-emerald-600">(Ctrl+V)</span></p>
                <div id="fotoCounter" class="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full text-[10px] font-black hidden">0 FOTO SIAP</div>
            </div>
 
            <button id="btnGenerate" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-5 rounded-2xl transition shadow-xl shadow-emerald-100 active:scale-95 text-xs tracking-widest uppercase">
                MULAI DESAIN SEKARANG ✨
            </button>
        </div>
 
        <div id="saveArea" class="hidden p-6 bg-emerald-50 rounded-[2.5rem] border border-emerald-100 flex flex-col items-center gap-2">
            <button id="btnSave" class="bg-emerald-600 text-white px-10 py-3 rounded-2xl text-[10px] font-black shadow-lg uppercase tracking-widest">SIMPAN KE CLOUD ☁️</button>
            <div id="resultId" class="mt-2 text-xl font-black text-emerald-700 hidden tracking-[0.2em]">ID BARU: <span id="displayId" class="underline"></span></div>
        </div>
    </div>
 
    <!-- PANEL PREVIEW -->
    <div class="lg:col-span-7 flex flex-col items-center">
        <div class="w-full flex justify-between items-end mb-4 px-2">
            <h2 class="text-xs font-black tracking-[0.2em] text-slate-400 uppercase">Live Slide Preview (Urutan Kebawah)</h2>
            <div class="h-2 w-2 bg-emerald-500 rounded-full animate-ping"></div>
        </div>
 
        <div id="canvasOuter" class="bg-slate-200 border border-slate-300 rounded-[2rem] shadow-inner">
            <div class="w-full text-center text-slate-400 my-auto text-xs font-bold uppercase tracking-wider py-20">
                Belum Ada Desain Generated.
            </div>
        </div>
 
        <button id="btnDownload" class="hidden mt-6 w-full bg-slate-900 text-white font-black py-5 rounded-[2rem] shadow-2xl hover:bg-black transition tracking-[0.4em] text-[11px] uppercase">
            🚀 Download Semua Slide (High Quality PNG)
        </button>
    </div>
</div>

<div id="hiddenRenderArea" style="position: absolute; top: -9999px; left: -9999px; width: 0; height: 0; overflow: hidden;"></div>
 
<script>
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwiLTj8sh6t9Zc6Znh1sdH_Y6u9TjOvMbo20jSRuhMRFOavsyHgkMnJr92ZTE_qEgJa/exec";
 
    const selectSlide = document.getElementById('jumlahGambar');
    for(let i=1; i<=10; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i + " SLIDE";
        if(i===5) opt.selected = true;
        selectSlide.appendChild(opt);
    }
 
    let listFotoBase64 = [];
    let currentHtml = "";
 
    function updateCounter() {
        const c = document.getElementById('fotoCounter');
        if (listFotoBase64.length > 0) {
            c.innerText = listFotoBase64.length + " FOTO SIAP PROSES";
            c.classList.remove('hidden');
        }
    }
 
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 800; 
                    const scale = MAX / Math.max(img.width, img.height);
                    canvas.width = img.width * scale; 
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.75).split(',')[1]);
                };
            };
        });
    }
 
    window.addEventListener('paste', async (e) => {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let item of items) {
            if (item.type.indexOf("image") !== -1) {
                listFotoBase64.push(await compressImage(item.getAsFile()));
                updateCounter();
            }
        }
    });
 
    document.getElementById('fotoInput').onchange = async (e) => {
        for (let file of e.target.files) {
            listFotoBase64.push(await compressImage(file));
        }
        updateCounter();
    };
 
    document.getElementById('btnGenerate').onclick = async () => {
        const info = document.getElementById('infoTeks').value;
        const materi = document.getElementById('catatanTambahan').value;
        if (!info || !materi) return alert("Harap isi Nama/Judul dan Materi terlebih dahulu!");
 
        setLoading(true, "AI SEDANG MERANCANG DESAIN PREMIUM...");
        const format = document.getElementById('formatBrosur').value;
        const bahasa = document.getElementById('opsiBahasa').value;
 
        try {
            const res = await fetch(BACKEND_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'generate',
                    infoTeks: info,
                    catatanTambahan: materi,
                    formatBrosur: format,
                    opsiBahasa: bahasa,
                    jumlahGambar: document.getElementById('jumlahGambar').value,
                    modelBrosur: document.getElementById('modelBrosur').value,
                    listFotoBase64: listFotoBase64
                })
            });
            const data = await res.json();
            if (data.success) {
                currentHtml = data.html;
                renderCarouselPreview(data.html, format);
                document.getElementById('btnDownload').classList.remove('hidden');
                document.getElementById('saveArea').classList.remove('hidden');
            } else {
                alert("Gagal memproses data: " + data.error);
            }
        } catch (e) {
            alert("Terjadi Error pada Web App.");
        }
        setLoading(false);
    };

    function renderCarouselPreview(htmlString, formatClass) {
        const outer = document.getElementById('canvasOuter');
        outer.innerHTML = ""; 
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlString;
        const slides = tempDiv.querySelectorAll('.instagram-slide');
        
        slides.forEach((slideHtml) => {
            const slideContainer = document.createElement('div');
            slideContainer.className = "slide-container";
            const ratioWrapper = document.createElement('div');
            ratioWrapper.className = formatClass;
            ratioWrapper.appendChild(slideHtml);
            slideContainer.appendChild(ratioWrapper);
            outer.appendChild(slideContainer);
        });
    }
 
    document.getElementById('btnDownload').onclick = async function() {
        const slides = document.querySelectorAll('#canvasOuter .instagram-slide');
        if(slides.length === 0) return;
        
        setLoading(true, "MENSINKRONISASI & GENERATING PNG...");
        const hiddenArea = document.getElementById('hiddenRenderArea');

        for (let i = 0; i < slides.length; i++) {
            const originalSlide = slides[i];
            const clonedSlide = originalSlide.cloneNode(true);
            hiddenArea.appendChild(clonedSlide);
            
            await new Promise(r => setTimeout(r, 200));

            const canvas = await html2canvas(clonedSlide, { 
                scale: 2, 
                useCORS: true, 
                logging: false,
                backgroundColor: null,
                width: clonedSlide.offsetWidth,
                height: clonedSlide.offsetHeight
            });

            hiddenArea.removeChild(clonedSlide);

            const link = document.createElement('a');
            link.download = `Slide-${i+1}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            await new Promise(r => setTimeout(r, 300));
        }
        setLoading(false);
    };
 
    document.getElementById('btnSave').onclick = async () => {
        setLoading(true, "MENYIMPAN KE CLOUD...");
        const res = await fetch(BACKEND_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'save', html: currentHtml, infoTeks: document.getElementById('infoTeks').value })
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('resultId').classList.remove('hidden');
            document.getElementById('displayId').innerText = data.projectId;
            // Perbarui list dropdown setelah sukses menyimpan
            await fetchProjectList();
        }
        setLoading(false);
    };
 
    document.getElementById('btnLoad').onclick = async () => {
        const id = document.getElementById('loadId').value;
        if(!id) return alert("Silakan pilih project dari dropdown terlebih dahulu!");
        
        setLoading(true, "MEMUAT DATA...");
        const res = await fetch(BACKEND_URL, { method: 'POST', body: JSON.stringify({ action: 'load', projectId: id }) });
        const data = await res.json();
        if (data.success) {
            currentHtml = data.html;
            const format = document.getElementById('formatBrosur').value;
            renderCarouselPreview(data.html, format);
            document.getElementById('btnDownload').classList.remove('hidden');
        } else {
            alert("ID Tidak Ditemukan.");
        }
        setLoading(false);
    };

    // FUNGSI OTO-LOAD BARU: Mengambil seluruh list project dari cloud saat web dibuka
    async function fetchProjectList() {
        try {
            const res = await fetch(BACKEND_URL, { method: 'POST', body: JSON.stringify({ action: 'get_projects' }) });
            const data = await res.json();
            if (data.success && data.projects) {
                const selectElement = document.getElementById('loadId');
                // Sisakan hanya option pertama ("Pilih Project...")
                selectElement.innerHTML = '<option value="">Pilih Project...</option>';
                
                data.projects.forEach(proj => {
                    let opt = document.createElement('option');
                    opt.value = proj.id;
                    opt.innerHTML = `[${proj.id}] ${proj.title}`;
                    selectElement.appendChild(opt);
                });
            }
        } catch(e) {
            console.log("Gagal memuat daftar project:", e);
        }
    }
 
    function setLoading(s, t) { 
        document.getElementById('loading').classList.toggle('hidden', !s); 
        document.getElementById('loadingText').innerText = t; 
    }

    // Jalankan penarikan data dropdown otomatis saat aplikasi pertama kali dimuat
    window.onload = () => {
        fetchProjectList();
    };
</script>
</body>
</html>
