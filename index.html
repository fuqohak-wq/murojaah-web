<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pesantren Brochure Generator</title>
    <!-- PERBAIKAN: Menggunakan CDN Tailwind v3 resmi yang stabil & lancar -->
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
    <!-- Html2Canvas untuk Download Gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .preview-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            background: #f3f4f6;
            border-radius: 1rem;
            border: 1px dashed #cbd5e1;
            overflow: hidden;
            position: relative;
        }

        /* Memaksa kontainer pratinjau mengikuti aspek rasio yang dipilih secara ketat */
        #canvasBrosur {
            width: 100%;
            max-width: 450px; 
            background: #ffffff;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-radius: 0.75rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Kelas Dinamis untuk Mengunci Dimensi Aspek Rasio */
        .ratio-1-1 {
            aspect-ratio: 1 / 1 !important;
        }
        .ratio-9-16 {
            aspect-ratio: 9 / 16 !important;
        }
        .ratio-a4 {
            aspect-ratio: 1 / 1.414 !important;
        }

        /* Memaksa elemen buatan Gemini muat di dalam rasio terkunci */
        #canvasBrosur > div {
            width: 100% !important;
            height: 100% !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: space-between !important;
            box-sizing: border-box !important;
            overflow: hidden !important;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto px-4 py-10">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-emerald-700 mb-2">Brosur Pesantren AI Generator</h1>
            <p class="text-gray-600">Ubah banyak foto mentah menjadi brosur profesional bertenaga AI Gemini</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
            <!-- Form Input (Kiri) -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Konfigurasi Brosur</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Apa yang ingin ditulis? (Informasi/Nama Pesantren)</label>
                        <textarea id="infoTeks" rows="4" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Contoh: Ponpes Miftahul Ulum Yahyawiyyah..."></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Format Brosur (Ukuran/Layout)</label>
                        <select id="formatBrosur" class="w-full p-3 border border-gray-300 rounded-lg bg-white">
                            <option value="Poster Instagram (1:1)">Poster Instagram (1:1)</option>
                            <option value="Pamflet Story (9:16)">Pamflet Story (9:16)</option>
                            <option value="Brosur Cetak A4 (Portrait)">Brosur Cetak A4 (Portrait)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Model / Tema Brosur</label>
                        <select id="modelBrosur" class="w-full p-3 border border-gray-300 rounded-lg bg-white">
                            <option value="Modern & Minimalis">Modern & Minimalis</option>
                            <option value="Tradisional Islami (Mewah/Gold)">Tradisional Islami (Mewah/Gold)</option>
                            <option value="Ceria & Edukatif (Anak-anak)">Ceria & Edukatif (Anak-anak)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Mode Gaya Visual Foto</label>
                        <select id="gayaVisual" class="w-full p-3 border border-gray-300 rounded-lg bg-white">
                            <option value="asli">Asli (Elegan & Natural)</option>
                            <option value="kartun">Kartun / Ilustratif (Pop Art)</option>
                            <option value="vintage">Vintage / Estetik Klasik</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Upload Foto-Foto Pesantren</label>
                        <input type="file" id="fotoInput" accept="image/*" multiple class="w-full p-2 border border-gray-300 rounded-lg bg-white">
                    </div>

                    <button id="btnGenerate" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 rounded-lg transition shadow-md cursor-pointer">
                        Buat Brosur Otomatis ✨
                    </button>
                </div>
            </div>

            <!-- Preview & Unduh (Kanan) -->
            <div class="space-y-4 w-full">
                <h2 class="text-xl font-semibold text-gray-700">Live Preview Brosur</h2>
                
                <div class="preview-container min-h-[500px]">
                    <div id="loading" class="hidden text-center z-20 absolute bg-white/95 p-6 rounded-xl shadow-md">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-600 mx-auto mb-2"></div>
                        <p class="text-sm font-medium text-gray-700">AI sedang mendesain ulang brosur...</p>
                    </div>
                    
                    <!-- Wadah Utama Hasil Render HTML AI -->
                    <div id="canvasBrosur" class="ratio-1-1">
                        <div class="w-full h-full flex items-center justify-center p-6 text-center text-gray-400">
                            Hasil brosur profesional Anda akan muncul utuh di sini
                        </div>
                    </div>
                </div>

                <!-- Tombol Download Tunggal Aktif -->
                <div id="downloadArea" class="hidden w-full">
                    <button onclick="downloadBrosur()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white py-3.5 rounded-xl font-semibold text-center shadow-lg transition-all transform hover:-translate-y-0.5 cursor-pointer">
                        📥 Download Hasil Brosur (Format Gambar)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwEsQd5f0yMGvGskfGBNSUcVUz6mC65o_OHJmP5QTTHi1jjgwH1_EspW9vT-1wxtlzqZw/exec"; 

        let listFotoBase64 = []; 

        document.getElementById('fotoInput').addEventListener('change', async function(e) {
            listFotoBase64 = []; 
            const files = e.target.files;
            if (files.length === 0) return;

            const readFileAsBase64 = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = function() {
                        const base64 = reader.result.replace(/^data:image\/(png|jpg|jpeg);base64,/, "");
                        resolve(base64);
                    }
                    reader.readAsDataURL(file);
                });
            };

            for (let i = 0; i < files.length; i++) {
                const base64Result = await readFileAsBase64(files[i]);
                listFotoBase64.push(base64Result);
            }
        });

        document.getElementById('btnGenerate').addEventListener('click', async () => {
            const infoTeks = document.getElementById('infoTeks').value;
            const formatBrosur = document.getElementById('formatBrosur').value;
            const modelBrosur = document.getElementById('modelBrosur').value;
            const gayaVisual = document.getElementById('gayaVisual').value;

            if (listFotoBase64.length === 0) {
                alert("Silakan unggah minimal satu foto pesantren terlebih dahulu!");
                return;
            }

            const canvas = document.getElementById('canvasBrosur');
            canvas.className = ""; 
            if (formatBrosur.includes("1:1")) {
                canvas.classList.add("ratio-1-1");
            } else if (formatBrosur.includes("9:16")) {
                canvas.classList.add("ratio-9-16");
            } else {
                canvas.classList.add("ratio-a4");
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('canvasBrosur').innerHTML = "";
            document.getElementById('downloadArea').classList.add('hidden');

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    body: JSON.stringify({ infoTeks, formatBrosur, modelBrosur, gayaVisual, listFotoBase64 })
                });
                const data = await response.json();

                if (data.success) {
                    document.getElementById('canvasBrosur').innerHTML = data.html;
                    document.getElementById('downloadArea').classList.remove('hidden');
                } else {
                    alert("Gagal membuat brosur: " + data.error);
                }
            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan koneksi ke server backend.");
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        });

        function downloadBrosur() {
            const element = document.getElementById('canvasBrosur');
            
            html2canvas(element, {
                useCORS: true,
                scale: 2, 
                logging: false,
                backgroundColor: "#ffffff",
                width: element.clientWidth,
                height: element.clientHeight
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `brosur-pesantren.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                alert("Gagal memproses unduhan gambar: " + err);
            });
        }
    </script>
</body>
</html>
